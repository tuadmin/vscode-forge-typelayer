name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Core Logic & E2E Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Architecture Dependencies
        run: npm ci

      - name: 🛡️ The Triple Crown Gatekeeper (Tests)
        # Using xvfb-run ensures vscode-test-electron has a virtual display on Linux headless agents
        run: xvfb-run npm run test

  publish:
    name: Build & Release Forge
    needs: test
    if: github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/v') && (github.event.base_ref == 'refs/heads/main' || github.event.base_ref == ''))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Architecture Dependencies
        run: npm ci

      - name: Verify Tag Version Match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Tag version (v$TAG_NAME) does not match package.json version ($PKG_VERSION). Aborting release to prevent version mismatch accidents."
            exit 1
          fi
          echo "Version match strictly verified: $PKG_VERSION"

      - name: Early Token Check (Fork Defense)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ] || [ -z "$OVSX_PAT" ]; then
            echo "Error: Missing deployment credentials (VSCE_PAT or OVSX_PAT)."
            echo "Stopping early. Forks cannot publish official market extensions."
            exit 1
          fi

      - name: Detect Alpha/Pre-Release Strategy
        id: release_strategy
        run: |
          if [[ "${{ github.ref_name }}" == *"-alpha"* ]] || [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "Detected PRE-RELEASE tag. Activating experimental flags."
            echo "PRERELEASE_FLAG=--pre-release" >> $GITHUB_ENV
          else
            echo "Detected STABLE tag."
            echo "PRERELEASE_FLAG=" >> $GITHUB_ENV
          fi

      - name: Forge Binary VSIX
        run: npx @vscode/vsce package
        
      - name: Publish to Github Releases Mirror
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          prerelease: ${{ env.PRERELEASE_FLAG != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Microsoft VS Code Marketplace
        run: npx @vscode/vsce publish ${{ env.PRERELEASE_FLAG }} -p ${{ secrets.VSCE_PAT }}

      - name: Deploy to Open VSX Registry
        run: npx ovsx publish ${{ env.PRERELEASE_FLAG }} -p ${{ secrets.OVSX_PAT }}
